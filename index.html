<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ミニスイカゲーム</title>
<style>
  body {
    margin: 0;
    background: #c2f0ff;
    text-align: center;
    font-family: sans-serif;
  }

  h1 {
    margin: 10px;
    color: #2c7a7b;
  }

  canvas {
    background: #ffffff;
    border: 4px solid #2c7a7b;
    border-radius: 10px;
  }
</style>
</head>
<body>

<h1>🍉 ミニスイカゲーム 🍉</h1>
<p>クリックでフルーツを落とす！同じものがくっつくと進化✨</p>
<canvas id="game" width="400" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const gravity = 0.4;
const fruits = [];

const types = [
  { emoji: "🍒", r: 12 },
  { emoji: "🍓", r: 16 },
  { emoji: "🍊", r: 20 },
  { emoji: "🍎", r: 24 },
  { emoji: "🍉", r: 30 }
];

// フルーツ追加
canvas.addEventListener("click", (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;

  fruits.push({
    x: x,
    y: 30,
    vy: 0,
    type: 0
  });
});

// 更新
function update() {
  fruits.forEach(f => {
    f.vy += gravity;
    f.y += f.vy;

    // 地面
    if (f.y + types[f.type].r > canvas.height) {
      f.y = canvas.height - types[f.type].r;
      f.vy *= -0.3;
    }
  });

  // 衝突＆合体
  for (let i = 0; i < fruits.length; i++) {
    for (let j = i + 1; j < fruits.length; j++) {
      let a = fruits[i];
      let b = fruits[j];

      let dx = a.x - b.x;
      let dy = a.y - b.y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      let minDist = types[a.type].r + types[b.type].r;

      if (dist < minDist) {
        // 反発
        let angle = Math.atan2(dy, dx);
        let overlap = minDist - dist;

        a.x += Math.cos(angle) * overlap/2;
        a.y += Math.sin(angle) * overlap/2;
        b.x -= Math.cos(angle) * overlap/2;
        b.y -= Math.sin(angle) * overlap/2;

        // 合体
        if (a.type === b.type && a.type < types.length - 1) {
          a.type++;
          fruits.splice(j, 1);
          j--;
        }
      }
    }
  }
}

// 描画
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  fruits.forEach(f => {
    ctx.font = (types[f.type].r * 2) + "px serif";
    ctx.textAlign = "center";
    ctx.fillText(types[f.type].emoji, f.x, f.y + types[f.type].r/2);
  });
}

// ループ
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
