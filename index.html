<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ミニあつ森風ゲーム</title>
<style>
  body {
    margin: 0;
    background: #b3ecff;
    font-family: sans-serif;
    text-align: center;
  }

  h1 {
    margin: 10px;
    color: #2c7a7b;
  }

  canvas {
    background: #87d37c;
    border: 4px solid #2c7a7b;
    border-radius: 10px;
  }

  .info {
    margin: 10px;
  }
</style>
</head>
<body>

<h1>🌴 ミニあつ森風 🌴</h1>
<div class="info">矢印キーで移動 / スペースで家具設置</div>
<canvas id="game" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const tileSize = 40;
const mapSize = 10;

// マップ生成
let map = [];
for (let y = 0; y < mapSize; y++) {
  let row = [];
  for (let x = 0; x < mapSize; x++) {
    let rand = Math.random();
    if (rand < 0.1) row.push("water");
    else if (rand < 0.2) row.push("tree");
    else row.push("grass");
  }
  map.push(row);
}

let player = { x: 1, y: 1 };
let furniture = [];

document.addEventListener("keydown", (e) => {
  let nx = player.x;
  let ny = player.y;

  if (e.key === "ArrowUp") ny--;
  if (e.key === "ArrowDown") ny++;
  if (e.key === "ArrowLeft") nx--;
  if (e.key === "ArrowRight") nx++;

  // 移動制限
  if (
    nx >= 0 && nx < mapSize &&
    ny >= 0 && ny < mapSize &&
    map[ny][nx] !== "water" &&
    map[ny][nx] !== "tree"
  ) {
    player.x = nx;
    player.y = ny;
  }

  // 家具設置
  if (e.key === " ") {
    furniture.push({ x: player.x, y: player.y });
  }

  draw();
});

function drawTile(x, y, type) {
  if (type === "grass") ctx.fillStyle = "#87d37c";
  if (type === "water") ctx.fillStyle = "#4da6ff";
  if (type === "tree") ctx.fillStyle = "#2e8b57";

  ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);

  // 絵文字
  if (type === "tree") {
    ctx.font = "24px sans-serif";
    ctx.fillText("🌳", x * tileSize + 5, y * tileSize + 30);
  }
  if (type === "water") {
    ctx.font = "24px sans-serif";
    ctx.fillText("🌊", x * tileSize + 5, y * tileSize + 30);
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // マップ描画
  for (let y = 0; y < mapSize; y++) {
    for (let x = 0; x < mapSize; x++) {
      drawTile(x, y, map[y][x]);
    }
  }

  // 家具
  ctx.font = "24px sans-serif";
  furniture.forEach(f => {
    ctx.fillText("🪑", f.x * tileSize + 5, f.y * tileSize + 30);
  });

  // プレイヤー
  ctx.font = "28px sans-serif";
  ctx.fillText("😀", player.x * tileSize + 5, player.y * tileSize + 30);
}

draw();
</script>

</body>
</html>
